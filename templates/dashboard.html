<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness AI - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container dashboard">
        <h1>Welcome Back! 👋</h1>

        <!-- Workout Session Modal -->
        <div id="workout-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🏋️ Today's Workout</h2>
                    <span class="close-btn" onclick="closeWorkoutModal()">&times;</span>
                </div>
                <div id="workout-session-container">
                    <!-- Dynamic workout session UI -->
                </div>
            </div>
        </div>

        <div id="dashboard-loading">Loading your program...</div>

        <div id="dashboard-content" class="hidden">
            <!-- Progress Section -->
            <div class="card progress-card">
                <h2>📊 Your Progress</h2>
                <div class="progress-stats">
                    <span id="progress-text">0/0 days completed</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <!-- Next Workout -->
            <div class="card" id="next-workout-card">
                <h2>🎯 Next Workout</h2>
                <div id="next-workout-info">
                    <p>Loading...</p>
                </div>
            </div>

            <!-- All Workouts -->
            <div class="card">
                <h2>📋 All Workouts</h2>
                <div id="workouts-list"></div>
            </div>
        </div>
    </div>

    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .close-btn {
            font-size: 28px;
            cursor: pointer;
            color: white;
        }

        .close-btn:hover {
            opacity: 0.7;
        }

        .exercise-card {
            padding: 20px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .exercise-name {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .timer {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .timer.running {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .question-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .option-btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.05);
        }

        .option-btn.selected {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .next-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-box {
            text-align: center;
            padding: 30px;
        }

        .result-success {
            color: #4caf50;
            font-size: 1.8em;
        }

        .result-fail {
            color: #e74c3c;
            font-size: 1.8em;
        }

        .retry-btn {
            background: #ff9800;
            margin-top: 15px;
        }
    </style>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
