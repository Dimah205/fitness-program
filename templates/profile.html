<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness AI - Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container">
        <h1>👤 My Profile</h1>

        <div class="card">
            <h2>Account Information</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="profile-email" readonly style="background: #f5f5f5;">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="profile-phone" readonly style="background: #f5f5f5;">
            </div>

        </div>

        <div class="card">
            <h2>🔒 Change Password</h2>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm new password">
            </div>
            <button type="button" id="change-password-btn" class="btn-primary">Change Password</button>
        </div>

        <div id="profile-message" class="message"></div>
    </div>

    <style>
        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>

    <script>
        class APIService {
            async request(url, method = 'GET', body = null) {
                const options = { method, credentials: 'same-origin', headers: {} };
                if (body) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(body);
                }
                try {
                    const response = await fetch(url, options);
                    return await response.json();
                } catch (error) {
                    console.error('API Error:', error);
                    return { success: false, message: 'Network error.' };
                }
            }
            get(url) { return this.request(url, 'GET'); }
            post(url, body) { return this.request(url, 'POST', body); }
            put(url, body) { return this.request(url, 'PUT', body); }
        }
        const api = new APIService();

        async function loadProfile() {
            const result = await api.get('/api/profile/info');
            if (result.success) {
                document.getElementById('profile-email').value = result.data.email || '';
                document.getElementById('profile-phone').value = result.data.phone || '';
                document.getElementById('profile-age').value = result.data.age || '';
            }
        }



        document.getElementById('change-password-btn').addEventListener('click', async () => {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!newPassword || newPassword !== confirmPassword) {
                alert('Passwords do not match or are empty!');
                return;
            }

            const result = await api.put('/api/profile/password', { password: newPassword });
            const msg = document.getElementById('profile-message');
            if (result.success) {
                msg.innerHTML = '<span style="color: #4caf50;">✅ Password changed successfully!</span>';
                msg.className = 'message success';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
                setTimeout(() => msg.className = 'message', 3000);
            } else {
                msg.innerHTML = '<span style="color: #e74c3c;">❌ ' + (result.message || 'Change failed') + '</span>';
                msg.className = 'message error';
            }
        });

        loadProfile();
    </script>
</body>
</html>
