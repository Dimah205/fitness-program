
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness AI - Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏋️ Fitness AI</h1>
            <p>Your Personal AI Fitness Trainer</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('login')">Login</button>
            <button class="tab-btn" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-tab" class="tab-content active">
            <form id="login-form">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
          </div>


        <!-- Register Form -->
        <div id="register-tab" class="tab-content">
            <form id="register-form">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="+905551234567" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required minlength="3">
                </div>
                <button type="submit" class="btn-primary">Send Verification Code</button>
            </form>

            <!-- Email Verification (hidden initially) -->

             <div id="reg-verify" class="hidden">
             <h3>Verify Your Email</h3>
            <p>A code has been sent to your email address.</p>
    <div class="form-group">
        <label>Verification Code</label>
        <input type="text" id="reg-code" placeholder="000000">
    </div>
    <button type="button" onclick="verifyEmail()" class="btn-primary" id="verify-email-btn">Verify & Continue</button>
    <p id="verify-loading" class="hidden" style="text-align: center; margin-top: 10px;">⏳ Verifying...</p>
    </div>

        <div id="message" class="message"></div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
